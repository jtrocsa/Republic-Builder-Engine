<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 84" role="img" aria-label="Broken ship wreckage">
  <defs>
    <linearGradient id="plank" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#8b572e"/>
      <stop offset="100%" stop-color="#5f391e"/>
    </linearGradient>
  </defs>
  <ellipse cx="50" cy="72" rx="36" ry="7" fill="#c7e7ed" opacity="0.3"/>

  <!-- snapped mast -->
  <rect x="20" y="6" width="9" height="62" rx="3" fill="url(#plank)" stroke="#2c1c10" stroke-width="2" transform="rotate(18 24 37)"/>
  <path d="M14 8 L34 4 L26 20 Z" fill="#5f391e" stroke="#2c1c10" stroke-width="1.5"/>

  <!-- crossed planks -->
  <rect x="38" y="46" width="54" height="10" rx="3" fill="url(#plank)" stroke="#2c1c10" stroke-width="2" transform="rotate(-8 65 51)"/>
  <rect x="46" y="54" width="46" height="9" rx="3" fill="#79502c" stroke="#2c1c10" stroke-width="2" transform="rotate(10 69 58)"/>

  <!-- torn sail scrap -->
  <path d="M60 20 Q78 24 82 42 Q68 40 58 30 Z" fill="#e6d6a9" opacity="0.85" stroke="#a5906a" stroke-width="1.5"/>

  <!-- rope coil -->
  <circle cx="30" cy="66" r="10" fill="none" stroke="#c9a25a" stroke-width="3"/>
  <circle cx="30" cy="66" r="5.5" fill="none" stroke="#c9a25a" stroke-width="3"/>
</svg>
